apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fire-stage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.ops.last-try.org/lt/fire/envs.git
    targetRevision: master
    path: stage/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
