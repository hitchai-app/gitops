apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mopoque-stage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.ops.last-try.org/lt/mopoque/mopoque.git
    targetRevision: main
    path: deploy/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: mopoque-stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
