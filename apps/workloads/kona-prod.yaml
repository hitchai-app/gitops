apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kona-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.ops.last-try.org/lt/kona/envs.git
    targetRevision: main
    path: prod/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
