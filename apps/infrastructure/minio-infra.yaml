---
# Shared infrastructure MinIO tenant (ADR 0027).
# prune: false — holds durable data (backup buckets); orphan cleanup is manual,
# mirroring the stateful-workload safety pattern (cf. youtrack), NOT minio-ephemeral.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-infra
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/hitchai-app/gitops.git
    targetRevision: HEAD
    path: infrastructure/minio-infra
  destination:
    server: https://kubernetes.default.svc
    namespace: minio-infra
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
