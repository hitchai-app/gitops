# PLACEHOLDER — replace encryptedData with real `kubeseal` output before deploying.
# This is NOT a real secret. Generation (values piped straight into kubeseal):
#
#   kubectl create secret generic minecraft-secrets \
#     --namespace minecraft-system \
#     --from-literal=rcon-password="$(openssl rand -base64 24)" \
#     --from-literal=cf-api-key='<your-curseforge-api-key>' \
#     --from-literal=restic-password="$(openssl rand -base64 32)" \
#     --from-literal=aws-access-key-id='<minio-infra access key>' \
#     --from-literal=aws-secret-access-key='<minio-infra secret key>' \
#     --dry-run=client -o yaml \
#   | kubeseal --controller-namespace sealed-secrets \
#       --controller-name sealed-secrets-controller --format yaml \
#     > workloads/minecraft/rcon-sealedsecret.yaml
#
# - cf-api-key: only needed for TYPE=AUTO_CURSEFORGE. Stored raw in k8s — no $$ escaping.
# - restic-password: LOSE THIS = backups unrecoverable. Record it.
# - aws-*: credentials for the minio-infra tenant (see §deploy — create a scoped user).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minecraft-secrets
  namespace: minecraft-system
spec:
  encryptedData:
    rcon-password: AgB_REPLACE_ME
    cf-api-key: AgB_REPLACE_ME
    restic-password: AgB_REPLACE_ME
    aws-access-key-id: AgB_REPLACE_ME
    aws-secret-access-key: AgB_REPLACE_ME
  template:
    metadata:
      name: minecraft-secrets
      namespace: minecraft-system
    type: Opaque
