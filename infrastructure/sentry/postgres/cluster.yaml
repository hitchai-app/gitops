apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: sentry-postgres
  namespace: sentry-system
spec:
  instances: 1

  postgresql:
    parameters:
      max_connections: "200"
      # Tuning per ADR 0046 (write-heavy: monitor check-ins ~16k/day)
      shared_buffers: "256MB"
      effective_cache_size: "768MB"
      maintenance_work_mem: "256MB"
      work_mem: "16MB"
      autovacuum_vacuum_scale_factor: "0.05"
      autovacuum_vacuum_insert_scale_factor: "0.05"
      autovacuum_vacuum_cost_limit: "1000"
      autovacuum_naptime: "30s"

  bootstrap:
    initdb:
      database: sentry
      owner: sentry

  storage:
    size: 20Gi
    storageClass: single-replica

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

  # Backup disabled - Sentry event data is non-critical
  # Can re-enable backups when cloudnativepg-backup-creds secret available
